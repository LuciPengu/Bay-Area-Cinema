kind = "web"
previewPath = "/"
title = "By the Bay Cinema"
version = "1.0.0"
id = "artifacts/by-the-bay-cinema"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22026
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/by-the-bay-cinema run dev"

[services.env]
PORT = "22026"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/by-the-bay-cinema", "run", "build"]
publicDir = "artifacts/by-the-bay-cinema/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
